# ─────────────────────────────────────────────
#  ChartEditor — Application Configuration
# ─────────────────────────────────────────────

# Server port — change this if 8080 is already in use
server.port=8080

# App name (shows in logs)
spring.application.name=ChartEditor

# Disable Spring Boot banner for cleaner startup
spring.main.banner-mode=off

# Max upload size for .chart files (increase if you have very large charts)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
