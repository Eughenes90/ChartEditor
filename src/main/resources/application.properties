# ─────────────────────────────────────────────
#  ChartEditor — Application Configuration
# ─────────────────────────────────────────────

# Render injects the PORT env variable — fallback to 8080 locally
server.port=${SERVER_PORT:8080}

spring.application.name=ChartEditor
spring.main.banner-mode=off

# Max upload size for .chart files
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
